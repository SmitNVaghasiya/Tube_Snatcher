<!DOCTYPE html>
<html>
<head>
    <title>Direct API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; }
        .result { margin: 20px 0; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 Direct API Test (No Extension)</h1>
    <p>This tests the API directly in Brave browser without extension restrictions.</p>
    
    <button onclick="testDirectAPI()">Test API Directly</button>
    <button onclick="testWithCORS()">Test with CORS Mode</button>
    <button onclick="testWithNoCORS()">Test with No-CORS Mode</button>
    
    <div id="result"></div>
    
    <script>
        async function testDirectAPI() {
            const result = document.getElementById('result');
            result.innerHTML = '<div class="result">Testing...</div>';
            
            try {
                console.log('🧪 Testing direct API call...');
                const response = await fetch('http://127.0.0.1:2004/api/v1/status');
                const data = await response.json();
                
                result.innerHTML = `
                    <div class="result success">
                        <h3>✅ Direct API Test Successful!</h3>
                        <p><strong>Status:</strong> ${data.status}</p>
                        <p><strong>Queue Size:</strong> ${data.queue_size}</p>
                        <p><strong>Active Downloads:</strong> ${data.active_downloads}</p>
                        <h4>Raw Response:</h4>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
                console.log('✅ Direct test successful:', data);
            } catch (error) {
                result.innerHTML = `
                    <div class="result error">
                        <h3>❌ Direct API Test Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Type:</strong> ${error.name}</p>
                        <h4>Error Details:</h4>
                        <pre>${error.stack || error.message}</pre>
                    </div>
                `;
                console.error('❌ Direct test failed:', error);
            }
        }
        
        async function testWithCORS() {
            const result = document.getElementById('result');
            result.innerHTML = '<div class="result">Testing with CORS mode...</div>';
            
            try {
                console.log('🧪 Testing with CORS mode...');
                const response = await fetch('http://127.0.0.1:2004/api/v1/status', {
                    method: 'GET',
                    mode: 'cors',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                const data = await response.json();
                
                result.innerHTML = `
                    <div class="result success">
                        <h3>✅ CORS Mode Test Successful!</h3>
                        <p><strong>Status:</strong> ${data.status}</p>
                        <p><strong>Queue Size:</strong> ${data.queue_size}</p>
                        <p><strong>Active Downloads:</strong> ${data.active_downloads}</p>
                        <h4>Raw Response:</h4>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
                console.log('✅ CORS test successful:', data);
            } catch (error) {
                result.innerHTML = `
                    <div class="result error">
                        <h3>❌ CORS Mode Test Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Type:</strong> ${error.name}</p>
                        <h4>Error Details:</h4>
                        <pre>${error.stack || error.message}</pre>
                    </div>
                `;
                console.error('❌ CORS test failed:', error);
            }
        }
        
        async function testWithNoCORS() {
            const result = document.getElementById('result');
            result.innerHTML = '<div class="result">Testing with No-CORS mode...</div>';
            
            try {
                console.log('🧪 Testing with No-CORS mode...');
                const response = await fetch('http://127.0.0.1:2004/api/v1/status', {
                    method: 'GET',
                    mode: 'no-cors'
                });
                
                result.innerHTML = `
                    <div class="result success">
                        <h3>✅ No-CORS Mode Test Successful!</h3>
                        <p><strong>Response Type:</strong> ${response.type}</p>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Status Text:</strong> ${response.statusText}</p>
                        <p><strong>Note:</strong> No-CORS mode doesn't allow reading response body</p>
                    </div>
                `;
                console.log('✅ No-CORS test successful:', response);
            } catch (error) {
                result.innerHTML = `
                    <div class="result error">
                        <h3>❌ No-CORS Mode Test Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Type:</strong> ${error.name}</p>
                        <h4>Error Details:</h4>
                        <pre>${error.stack || error.message}</pre>
                    </div>
                `;
                console.error('❌ No-CORS test failed:', error);
            }
        }
        
        // Auto-test on page load
        window.addEventListener('load', () => {
            console.log('🚀 Direct test page loaded. Use the buttons to test different methods.');
        });
    </script>
</body>
</html>
